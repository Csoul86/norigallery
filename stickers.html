<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nori Sticker Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00f0ff;--p:#a855f7;--g:#00ff88;--o:#ff6b35;
  --bg:#000;--card:#080808;--card2:#0a0a0a;
  --b:rgba(0,240,255,0.11);--bh:rgba(0,240,255,0.38);
  --bp:rgba(168,85,247,0.15);--bg2:rgba(0,255,136,0.12);
  --text:#c8eaee;--muted:rgba(200,234,238,0.36);
}
html{scroll-behavior:smooth}
body{
  min-height:100%;min-height:-webkit-fill-available;
  background:var(--bg);color:var(--text);
  font-family:'Exo 2',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;display:block}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  height:clamp(56px,8vh,68px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,3vw,1.8rem);
  padding-top:env(safe-area-inset-top,0);
  background:rgba(0,0,0,0.88);
  border-bottom:1px solid rgba(0,240,255,0.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(0,240,255,0.04), 0 4px 24px rgba(0,0,0,0.6);
}

.logo{display:flex;align-items:center;gap:clamp(0.6rem,2vw,0.95rem);animation:slideInLeft .6s cubic-bezier(.22,1,.36,1) both}
.logo-icon{
  width:clamp(32px,5vh,40px);height:clamp(32px,5vh,40px);
  display:flex;align-items:center;justify-content:center;
  border-radius:9px;border:1px solid rgba(0,240,255,0.15);
  background:rgba(0,240,255,0.04);
  flex-shrink:0;animation:float 3s ease-in-out infinite;
  overflow:hidden;
}
.logo-icon svg{width:60%;height:60%;stroke:var(--c);filter:drop-shadow(0 0 6px rgba(0,240,255,0.4))}
.logo-text{display:flex;flex-direction:column;gap:0.15rem}
.logo-title{font-family:'Orbitron',sans-serif;font-size:clamp(0.58rem,1.8vw,0.74rem);font-weight:700;letter-spacing:0.12em;color:var(--c);text-transform:uppercase;text-shadow:0 0 12px rgba(0,240,255,0.3)}
.logo-sub{font-size:clamp(0.48rem,1.3vw,0.58rem);letter-spacing:0.1em;color:rgba(0,240,255,0.35);text-transform:uppercase}

.header-center{display:flex;flex-direction:column;align-items:center;gap:0.2rem;flex:1;text-align:center}
.header-count{font-family:'Orbitron',sans-serif;font-size:clamp(0.55rem,1.6vw,0.68rem);font-weight:700;letter-spacing:0.08em;color:var(--c);text-shadow:0 0 10px rgba(0,240,255,0.3);animation:fadeDown .6s .1s cubic-bezier(.22,1,.36,1) both}
.header-date{font-size:clamp(0.48rem,1.3vw,0.58rem);color:rgba(0,240,255,0.25);letter-spacing:0.08em;text-transform:uppercase}

.header-right{display:flex;gap:0.5rem}
.header-btn{background:rgba(0,240,255,0.03);border:1px solid rgba(0,240,255,0.12);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;color:var(--c);text-decoration:none;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.header-btn:hover{border-color:rgba(0,240,255,0.45);background:rgba(0,240,255,0.07);box-shadow:0 0 14px rgba(0,240,255,0.12)}
.header-btn svg{width:16px;height:16px}

/* ── MAIN ── */
main{
  position:relative;z-index:1;
  max-width:1200px;margin:0 auto;
  padding:clamp(2rem,4.5vh,3.2rem) clamp(1rem,3vw,1.8rem) clamp(3rem,8vh,5rem);
}

.page-header{margin-bottom:clamp(1.8rem,5vh,2.8rem);text-align:center}
.page-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.3rem,4.5vw,2rem);
  font-weight:900;letter-spacing:0.08em;
  color:var(--text);
  margin-bottom:0.5rem;
  animation:fadeDown .7s cubic-bezier(.22,1,.36,1) both,glowPulse 3s ease-in-out infinite;
}
.page-sub{
  font-size:clamp(0.78rem,2vw,0.9rem);
  color:var(--muted);letter-spacing:0.05em;
  animation:fadeDown .7s .12s cubic-bezier(.22,1,.36,1) both;
}

.states{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1.5rem;text-align:center}
.spinner{width:36px;height:36px;border:2px solid rgba(0,240,255,0.2);border-top-color:var(--c);border-radius:50%;animation:spin .8s linear infinite,pulse 2s ease-in-out infinite;box-shadow:0 0 16px rgba(0,240,255,0.15)}
@keyframes spin{to{transform:rotate(360deg)}}

.state-title{font-family:'Orbitron',sans-serif;font-size:clamp(0.9rem,2.5vw,1.1rem);font-weight:700;letter-spacing:0.08em;color:var(--text)}
.state-sub{font-size:clamp(0.7rem,1.8vw,0.82rem);color:var(--muted)}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:clamp(0.6rem,2vw,0.95rem);
  margin-bottom:clamp(1.6rem,4vh,2.2rem);
  padding-bottom:clamp(1rem,2.5vh,1.4rem);
  border-bottom:1px solid rgba(0,240,255,0.08);
  flex-wrap:wrap;
  animation:fadeUp .6s .2s cubic-bezier(.22,1,.36,1) both;
}

.btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:clamp(0.6rem,1.5vh,0.75rem) clamp(1rem,2vw,1.3rem);
  background:rgba(0,240,255,0.04);
  border:1px solid rgba(0,240,255,0.15);
  border-radius:9px;
  color:rgba(0,240,255,0.75);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.58rem,1.6vw,0.66rem);
  font-weight:700;letter-spacing:0.09em;
  text-decoration:none;text-transform:uppercase;
  cursor:pointer;transition:all .22s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 25%,rgba(0,240,255,0.08) 50%,transparent 75%);
  transform:translateX(-120%);transition:transform .6s ease;
}
.btn:hover::before{transform:translateX(120%)}
.btn:hover{
  border-color:rgba(0,240,255,0.4);color:var(--c);
  background:rgba(0,240,255,0.06);
  box-shadow:0 0 18px rgba(0,240,255,0.12);
}
.btn svg{width:13px;height:13px;flex-shrink:0}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(clamp(120px,20vw,160px), 1fr));
  gap:clamp(0.8rem,2vw,1.1rem);
  animation:fadeUp .6s .3s cubic-bezier(.22,1,.36,1) both;
}

/* Mobile: 2 columns */
@media(max-width:640px){
  .grid{grid-template-columns:repeat(2, 1fr);gap:clamp(0.6rem,3vw,0.85rem)}
}

/* Tablet: 3 columns */
@media(min-width:641px) and (max-width:1024px){
  .grid{grid-template-columns:repeat(3, 1fr);gap:clamp(0.75rem,2.5vw,1rem)}
}

/* Desktop: 4+ columns */
@media(min-width:1025px){
  .grid{grid-template-columns:repeat(auto-fill, minmax(clamp(140px,18vw,180px), 1fr));gap:clamp(0.9rem,2vw,1.2rem)}
}

.card{
  position:relative;
  background:linear-gradient(135deg,rgba(8,8,8,1) 0%,rgba(6,6,6,1) 100%);
  border:1px solid rgba(0,240,255,0.1);
  border-radius:12px;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .28s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  animation:scaleIn .5s cubic-bezier(.22,1,.36,1) backwards;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,0.04) 0%,transparent 65%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.card:hover::after{opacity:1}
.card:hover{
  border-color:rgba(0,240,255,0.28);
  box-shadow:0 12px 40px rgba(0,240,255,0.1),0 0 0 1px rgba(0,240,255,0.04);
  transform:translateY(-4px);
}

.card-img{
  width:100%;aspect-ratio:1;
  background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.card-img img{
  width:100%;height:100%;object-fit:contain;
  transition:transform .35s cubic-bezier(.22,1,.36,1),filter .25s;
  filter:brightness(1);
}
.card:hover .card-img img{transform:scale(1.08);filter:brightness(1.15)}

.card-body{
  padding:clamp(0.7rem,2vh,0.9rem);
  display:flex;flex-direction:column;gap:0.6rem;
  border-top:1px solid rgba(0,240,255,0.07);
  background:rgba(0,240,255,0.01);
}

.card-id{
  font-family:'Courier New',monospace;
  font-size:clamp(0.65rem,1.5vw,0.75rem);
  color:rgba(0,240,255,0.65);
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;letter-spacing:0.03em;
  font-weight:600;
}

.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:0.35rem;
  padding:clamp(0.45rem,1.2vh,0.55rem);
  background:rgba(0,240,255,0.05);
  border:1px solid rgba(0,240,255,0.12);
  border-radius:7px;
  color:rgba(0,240,255,0.6);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(0.58rem,1.4vw,0.64rem);
  font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;overflow:hidden;
}
.copy-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transform:translateX(-100%);
  animation:shimmer 2s infinite;
  opacity:0;
}
.copy-btn:hover::before{opacity:1}
.copy-btn:hover,.copy-btn:active{
  background:rgba(0,240,255,0.1);
  border-color:rgba(0,240,255,0.28);
  color:var(--c);
  box-shadow:0 0 12px rgba(0,240,255,0.1);
}
.copy-btn.copied{
  border-color:var(--g);color:var(--g);background:rgba(0,255,136,0.07);
}
.copy-btn svg{width:10px;height:10px;flex-shrink:0}

/* ── ANIMATIONS ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,240,255,0.3),inset 0 0 8px rgba(0,240,255,0.1)}50%{box-shadow:0 0 20px rgba(0,240,255,0.6),inset 0 0 12px rgba(0,240,255,0.2)}}
@keyframes iconSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wobble{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

#loading, #empty, #error, #content {display:none}
#loading.active, #empty.active, #error.active, #content.active {display:block}
#loading{display:flex}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  header{padding:0 clamp(0.8rem,3vw,1rem)}
  main{padding:clamp(1.5rem,3vh,2rem) clamp(0.8rem,2.5vw,1.2rem) clamp(2rem,6vh,3rem)}
}
@media(hover:none) and (pointer:coarse){
  .card:hover{transform:none;box-shadow:none;border-color:rgba(0,240,255,0.1)}
  .card:hover .card-img img{transform:scale(1.03)}
  .card:active{border-color:rgba(0,240,255,0.26)}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<header>
  <div class="logo">
    <div class="logo-icon">
      <img src="norilogo.png" alt="Nori" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 6px rgba(0,240,255,0.4))">
    </div>
    <div class="logo-text">
      <span class="logo-title">Nori Sticker Gallery</span>
      <span class="logo-sub">Asset Showcase</span>
    </div>
  </div>

  <div class="header-center">
    <div class="header-count" id="header-count">Loading...</div>
    <div class="header-date" id="header-date"></div>
  </div>

  <div class="header-right">
    <a href="#" class="header-btn" id="raw-link" target="_blank" title="View Raw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>
  </div>
</header>

<main>
  <div id="loading" class="active">
    <div class="states">
      <div class="spinner"></div>
      <div class="state-title">Fetching Stickers...</div>
      <div class="state-sub">Loading your asset collection</div>
    </div>
  </div>

  <div id="empty">
    <div class="states">
      <div class="state-title">No Paste Found</div>
      <div class="state-sub">Please provide a valid paste ID in the URL</div>
    </div>
  </div>

  <div id="error">
    <div class="states">
      <div class="state-title">Could Not Load</div>
      <div class="state-sub">The paste may be invalid, expired, or unreachable</div>
    </div>
  </div>

  <div id="content">
    <div class="page-header">
      <div class="page-title">Nori Sticker Gallery</div>
      <div class="page-sub">Browse and copy your assets</div>
    </div>
    <div class="toolbar">
      <button class="btn" id="copy-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy All
      </button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<script>
(function(){
  var cv=document.getElementById('c'),cx=cv.getContext('2d');
  var W,H,pts=[];
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);
  function Pt(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.26;this.vy=(Math.random()-.5)*.16;
    this.r=Math.random()*1.5+.3;this.a=Math.random()*.45+.08;
    this.t=Math.random()*Math.PI*2;this.col=Math.floor(Math.random()*3);
  }
  for(var i=0;i<45;i++)pts.push(new Pt());
  var COLS=['#00f0ff','#a855f7','#00ff88'],scanT=0;
  function frame(){
    cx.clearRect(0,0,W,H);scanT+=.0022;
    cx.strokeStyle='rgba(0,240,255,0.027)';cx.lineWidth=.7;
    for(var x=0;x<W;x+=52){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(var y=0;y<H;y+=52){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    var sy=(scanT%1)*H;
    var sg=cx.createLinearGradient(0,sy-70,0,sy+70);
    sg.addColorStop(0,'rgba(0,240,255,0)');sg.addColorStop(.5,'rgba(0,240,255,0.02)');sg.addColorStop(1,'rgba(0,240,255,0)');
    cx.fillStyle=sg;cx.fillRect(0,sy-70,W,140);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;p.t+=.015;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){cx.globalAlpha=(1-d/100)*.09;cx.strokeStyle='#00f0ff';cx.lineWidth=.4;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke();}
      }
      var pulse=.5+.5*Math.sin(p.t);
      cx.globalAlpha=p.a*pulse;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=COLS[p.col];cx.fill();
    }
    cx.globalAlpha=1;requestAnimationFrame(frame);
  }
  frame();
})();

const pasteId = new URLSearchParams(location.search).get('id');

function showState(el) {
  ['loading','empty','error','content'].forEach(x => {
    document.getElementById(x).classList.toggle('active',x===el);
  });
}

function copyText(text,btn) {
  const fallback=()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  };
  (navigator.clipboard?navigator.clipboard.writeText(text).catch(fallback):Promise.resolve(fallback())).then(()=>{
    if(!btn)return;
    const orig=btn.innerHTML;
    btn.classList.add('copied');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=orig;},1500);
  });
}

function parseIds(t){return t.match(/\d{6,}/g)||[]}

async function tryFetch(url){
  const proxies=[url,`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for(const u of proxies){
    try{const r=await fetch(u);if(r.ok){const t=await r.text();if(t)return t}}catch(_){}
  }
  return null;
}

async function init(){
  if(!pasteId){showState('empty');return}
  const rawUrl=`https://pastefy.app/${pasteId}/raw`;
  document.getElementById('raw-link').href=rawUrl;
  const text=await tryFetch(rawUrl);
  if(!text){showState('error');return}
  const ids=parseIds(text);
  if(!ids.length){showState('error');return}
  document.getElementById('header-count').textContent=`${ids.length} Stickers`;
  document.getElementById('copy-all').onclick=function(){copyText(ids.join('\n'),this)};
  const grid=document.getElementById('grid');
  ids.forEach((id,idx)=>{
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(idx*0.05)+'s';
    card.innerHTML=`
      <div class="card-img">
        <img id="img-${id}" src="https://placehold.co/420x420/0a0a0a/444?text=..." loading="lazy" alt="Sticker ${id}">
      </div>
      <div class="card-body">
        <div class="card-id">${id}</div>
        <button class="copy-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>`;
    card.querySelector('.copy-btn').onclick=()=>copyText(id,card.querySelector('.copy-btn'));
    grid.appendChild(card);
  });
  showState('content');
  for(let i=0;i<ids.length;i+=100){
    const chunk=ids.slice(i,i+100);
    const proxyUrl=`https://thumbnails.roproxy.com/v1/assets?assetIds=${chunk.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png`;
    fetch(proxyUrl).then(r=>r.json()).then(data=>{
      if(data&&data.data){
        data.data.forEach(item=>{
          const imgElement=document.getElementById(`img-${item.targetId}`);
          if(imgElement){imgElement.src=item.state==="Completed"?item.imageUrl:"https://placehold.co/420x420/1a1a1a/ff3333?text=N/A"}
        });
      }
    }).catch(console.error);
  }
}
init();
</script>
